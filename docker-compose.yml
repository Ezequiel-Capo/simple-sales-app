services:
  backend:
    build:
      context: ./backend
    container_name: sales-backend
    environment:
      PORT: 4000
      DB_PATH: /app/data/sales.db
    volumes:
      - sales_data:/app/data
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: sales-frontend
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  sales_data:
